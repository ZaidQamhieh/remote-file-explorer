name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  # Callable so release.yml can require these exact gates before publishing,
  # instead of a second copy that drifts out of sync with this one (PR-70).
  workflow_call:

jobs:
  agent:
    name: Agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: gofmt check
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo '^ run gofmt -w'; exit 1; }

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  contract:
    name: OpenAPI contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Redocly lint (fail on errors)
        run: npx --yes @redocly/cli@latest lint protocol/openapi.yaml

  app:
    name: App (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: "3.44.2"

      - name: flutter pub get
        run: flutter pub get

      - name: dart format check
        run: dart format --output=none --set-exit-if-changed .

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test
