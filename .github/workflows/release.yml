name: Release

# Continuous delivery: build the Android release APK on a GitHub runner and
# publish it (plus a `latest.json` manifest) as a GitHub Release asset, so
# releases no longer go through the local `release.sh` Gradle build.
#
# **How to cut a release:** bump `app/pubspec.yaml`'s `version:` to `X.Y.Z+N`
# (the build number N MUST increase — OTA detection compares versionCode),
# commit, then push a matching tag:
#
#     git tag v1.12.0 && git push origin v1.12.0
#
# This is the ONLY step that publishes a public artifact; nothing here runs
# until such a tag is pushed. The agent's local update channel (`release.sh` →
# `~/.rfe-agent/updates/`) keeps working unchanged as a fallback source.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # A tag used to publish straight from a build that had passed nothing: the
  # gates only ran on branch pushes, and this workflow tracked floating
  # `stable` while CI pinned a Flutter version. Requiring the real CI workflow
  # means the published artifact is built from a commit that passed the very
  # same checks, on the very same toolchain (PR-70).
  verify:
    name: CI gates
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & publish APK
    needs: verify
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Pinned to the same version ci.yml verifies with. Floating `stable`
      # meant a tag could ship on a toolchain nothing had ever tested.
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: "3.44.2"

      - name: flutter pub get
        working-directory: app
        run: flutter pub get

      # Recreate the release signing material from secrets so the CI-built APK
      # is signed with the SAME upload key as local builds — without this the
      # OTA updater can detect a new version but Android refuses to install it
      # (signature mismatch). The keystore lands in $RUNNER_TEMP (absolute path)
      # and key.properties at app/android/ where build.gradle.kts reads it.
      - name: Configure release signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_B64:-}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret missing — cannot sign release"
            exit 1
          fi
          ks="$RUNNER_TEMP/upload-keystore.jks"
          printf '%s' "$KEYSTORE_B64" | base64 -d > "$ks"
          {
            echo "storeFile=$ks"
            echo "storePassword=$STORE_PW"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PW"
          } > app/android/key.properties

      - name: Build release APK
        working-directory: app
        run: flutter build apk --release

      - name: Stage artifact + manifest
        id: stage
        run: |
          set -euo pipefail
          line="$(grep -E '^version:' app/pubspec.yaml | head -1 | awk '{print $2}')"
          name="${line%%+*}"
          code="${line##*+}"
          if [ "$name" = "$line" ] || [ -z "$code" ]; then
            echo "::error::pubspec version '$line' must be X.Y.Z+N (build number drives OTA detection)"
            exit 1
          fi
          # The tag should match the pubspec versionName (tag v1.2.0 ↔ 1.2.0).
          tag_ver="${GITHUB_REF_NAME#v}"
          if [ "$tag_ver" != "$name" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' does not match pubspec versionName '$name' — bump pubspec before tagging"
            exit 1
          fi
          apk="rfe-${name}-${code}.apk"
          cp app/build/app/outputs/flutter-apk/app-release.apk "$apk"
          size="$(stat -c%s "$apk")"
          sha256="$(sha256sum "$apk" | cut -d' ' -f1)"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${apk}"
          # Same shape as the agent's GET /v1/app/latest (versionName/versionCode/
          # size) plus the download `url` and `sha256` (PR-25) the off-Tailscale
          # client needs to verify what it downloaded, since size alone can't
          # catch a truncated-but-same-length or corrupted transfer.
          printf '{"versionName":"%s","versionCode":%s,"size":%s,"url":"%s","sha256":"%s"}\n' \
            "$name" "$code" "$size" "$url" "$sha256" > latest.json
          echo "apk=$apk" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "Built $apk ($size bytes)"
          cat latest.json

      - name: Publish GitHub Release
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.stage.outputs.apk }}" \
            latest.json \
            --title "v${{ steps.stage.outputs.name }} (build ${{ steps.stage.outputs.code }})" \
            --generate-notes
