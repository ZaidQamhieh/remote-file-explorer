openapi: 3.0.3
info:
  title: Remote File Explorer — Host Agent API
  version: 1.1.0
  description: >
    Contract between the Flutter mobile app and the Go host agent. JSON for control and
    metadata; binary streams for file content. All routes except /pair and /health require
    a bearer device token. A WebSocket channel (/v1/events) for live progress and filesystem
    change-event push is planned for a future wave but does not exist yet — clients must poll
    (e.g. GET /transfers/{id}, GET /fs) for now.
servers:
  - url: https://{host}:{port}/v1
    variables:
      host: { default: "127.0.0.1" }
      port: { default: "8765" }

security:
  - deviceToken: []

paths:
  /health:
    get:
      summary: Liveness probe (unauthenticated)
      security: []
      responses:
        "200":
          description: Agent is up
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }

  /pair:
    post:
      summary: Complete device pairing (unauthenticated; consumes one-time pairing code)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PairRequest" }
      responses:
        "200":
          description: Device paired; token issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PairResponse" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "429":
          description: >
            Too many pairing attempts (rate-limited at 10/min per agent, since the
            pairing code is short and brute-forceable). code=RATE_LIMITED.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /system/drives:
    get:
      summary: List drives / mount points (virtual roots)
      responses:
        "200":
          description: Drives
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Drive" }

  /fs:
    get:
      summary: List a directory
      parameters:
        - { in: query, name: path, required: true, schema: { type: string } }
        - { in: query, name: cursor, schema: { type: string }, description: Pagination cursor (by name) }
        - { in: query, name: limit, schema: { type: integer, default: 200 } }
      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Listing" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      summary: Permanently delete one or more paths (recursive, irreversible)
      description: >
        Deletes are permanent and recursive (equivalent to `rm -rf`). There is no
        trash/recycle bin — the agent calls the OS-level recursive remove directly
        and the data cannot be recovered. Directories are removed along with all
        of their contents.
      parameters:
        - { in: query, name: path, schema: { type: string }, description: Single path; or use body for batch }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                paths: { type: array, items: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/BatchResult" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /fs/folder:
    post:
      summary: Create a folder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRequest" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }

  /fs/file:
    post:
      summary: Create an empty file
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRequest" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }

  /fs/rename:
    patch:
      summary: Rename / move a single entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [src, dst]
              properties:
                src: { type: string }
                dst: { type: string }
      responses:
        "200": { description: Renamed, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }

  /fs/copy:
    post:
      summary: Copy / duplicate entries (batch-capable)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TransferOpRequest" } } }
      responses:
        "202": { $ref: "#/components/responses/BatchResult" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }

  /fs/move:
    post:
      summary: Move entries (batch-capable)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TransferOpRequest" } } }
      responses:
        "202": { $ref: "#/components/responses/BatchResult" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }

  /fs/meta:
    get:
      summary: Detailed metadata for a single entry
      parameters:
        - { in: query, name: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Metadata, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /content:
    get:
      summary: Download file content (supports HTTP Range for resumable download)
      parameters:
        - { in: query, name: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Full content, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
        "206": { description: Partial content (Range) }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "416": { $ref: "#/components/responses/Error" }
    put:
      summary: Write (replace) a small text file's content, atomically
      description: >
        Writes the request body to path, replacing its current content. The
        write is atomic (temp file + rename) and the existing file's mode is
        preserved. The body is capped at 5 MiB; larger payloads are rejected
        with 413. Pass baseModified (the `modified` value last read for this
        file via /fs/meta or /fs) to get optimistic-concurrency protection —
        if the file's mtime no longer matches, the write is rejected with 409
        instead of clobbering newer content.
      parameters:
        - { in: query, name: path, required: true, schema: { type: string } }
        - in: query
          name: baseModified
          required: false
          schema: { type: string, format: date-time }
          description: >
            The `modified` timestamp (RFC3339) last read for this file.
            Compared (truncated to the second) against the file's current
            mtime; a mismatch returns 409 STALE_WRITE. Omit for an
            unconditional write (e.g. creating new content).
      requestBody:
        required: true
        content: { application/octet-stream: { schema: { type: string, format: binary } } }
      responses:
        "200": { description: Updated metadata, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }

  /transfers:
    post:
      summary: Open a resumable upload session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, size, sha256, chunkSize]
              properties:
                path: { type: string }
                size: { type: integer, format: int64 }
                sha256: { type: string }
                chunkSize: { type: integer }
                overwrite:
                  type: boolean
                  default: false
                  description: >
                    When false (default) and path already exists, the
                    session is rejected with 409 CONFLICT. When true, an
                    existing file at path is replaced once the upload
                    completes.
      responses:
        "201":
          description: Session opened
          content: { application/json: { schema: { $ref: "#/components/schemas/UploadSession" } } }
        "400":
          description: >
            Invalid request — missing path/sha256/chunkSize, negative size, or
            chunkSize over the 32MiB cap. code=BAD_REQUEST.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409":
          description: >
            path already exists and overwrite=false. code=CONFLICT.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /transfers/{id}:
    get:
      summary: Get session status + missing chunks (for resume)
      parameters: [ { in: path, name: id, required: true, schema: { type: string } } ]
      responses:
        "200": { description: Session, content: { application/json: { schema: { $ref: "#/components/schemas/UploadSession" } } } }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /transfers/{id}/chunks/{n}:
    put:
      summary: Upload chunk n (per-chunk checksum)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
        - { in: path, name: n, required: true, schema: { type: integer } }
        - in: header
          name: Content-Range
          required: false
          schema: { type: string }
          description: >
            Optional/informational only — the agent does not currently read this
            header. Chunk placement is fully determined by the {n} path segment
            and the session's chunkSize from POST /transfers.
        - { in: header, name: X-Chunk-Sha256, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/octet-stream: { schema: { type: string, format: binary } } }
      responses:
        "204": { description: Chunk stored }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }

  /transfers/{id}/complete:
    post:
      summary: Finalize upload (verify whole-file hash, atomic rename)
      parameters: [ { in: path, name: id, required: true, schema: { type: string } } ]
      responses:
        "200": { description: Completed, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "422":
          description: Whole-file SHA-256 mismatch. code=HASH_MISMATCH.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /thumb:
    get:
      summary: Server-rendered thumbnail / preview
      parameters:
        - { in: query, name: path, required: true, schema: { type: string } }
        - { in: query, name: size, schema: { type: integer, default: 256 } }
      responses:
        "200": { description: Thumbnail, content: { image/jpeg: { schema: { type: string, format: binary } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "404":
          description: No thumbnail available for this file. code=NOT_AVAILABLE.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /search:
    get:
      summary: Search files and folders
      description: >
        Recursively searches under root (or the configured roots / home
        directory) for entries matching q, optionally narrowed by types,
        ext, size bounds, and modified-time bounds. All filters are ANDed
        together. The response body is always a bare JSON array of Entry
        (unchanged from v1) — truncation/partial-result state is signaled
        via response headers instead, so existing clients that only read
        the array continue to work.
      parameters:
        - in: query
          name: q
          required: true
          description: >
            Case-insensitive match against the entry name. If the value
            contains `*` or `?`, it is treated as a glob pattern (matched
            with path.Match against the lowercased name); an invalid glob
            pattern returns 400 BAD_REQUEST. Otherwise it is a
            case-insensitive substring match.
          schema: { type: string }
        - { in: query, name: root, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, default: 100, maximum: 500 } }
        - in: query
          name: types
          description: >
            Comma-separated list of categories to include (AND-ed with the
            other filters). Unknown values return 400 BAD_REQUEST.
          schema:
            type: array
            items:
              type: string
              enum: [folder, image, video, audio, document, archive, other]
          style: form
          explode: false
        - in: query
          name: ext
          description: >
            Comma-separated list of file extensions to include, without the
            leading dot, case-insensitive (e.g. `jpg,png`). Implies
            non-folder; may be combined with types.
          schema: { type: string }
        - in: query
          name: minSize
          description: >
            Minimum file size in bytes (inclusive). When minSize and/or
            maxSize is set, folders are excluded from results. Invalid
            (non-integer) values return 400 BAD_REQUEST.
          schema: { type: integer, format: int64 }
        - in: query
          name: maxSize
          description: >
            Maximum file size in bytes (inclusive). When minSize and/or
            maxSize is set, folders are excluded from results. Invalid
            (non-integer) values return 400 BAD_REQUEST.
          schema: { type: integer, format: int64 }
        - in: query
          name: modifiedAfter
          description: >
            Only include entries modified at or after this timestamp
            (RFC3339). Invalid timestamps return 400 BAD_REQUEST.
          schema: { type: string, format: date-time }
        - in: query
          name: modifiedBefore
          description: >
            Only include entries modified at or before this timestamp
            (RFC3339). Invalid timestamps return 400 BAD_REQUEST.
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: >
            Results as a bare JSON array of Entry (filters applied;
            truncation/time-budget state is reported via headers, not the
            body).
          headers:
            X-Search-Truncated:
              description: >
                Set to `1` when the walk stopped early because the result
                limit was reached. Not set if the walk finished naturally
                or the time budget expired before the limit was hit.
              schema: { type: string, enum: ["1"] }
            X-Search-Time-Budget:
              description: >
                Set to `1` when the 15s search time budget expired before
                the result limit was reached, indicating the results are
                partial. Mutually exclusive with X-Search-Truncated.
              schema: { type: string, enum: ["1"] }
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Entry" } }
        "400":
          description: >
            BAD_REQUEST — missing q, an invalid glob pattern in q, an
            unknown types value, a non-integer minSize/maxSize, or an
            invalid RFC3339 modifiedAfter/modifiedBefore.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "401": { $ref: "#/components/responses/Error" }

  /settings:
    get:
      summary: Get agent settings
      security: [{ deviceToken: [] }]
      responses:
        '200':
          description: Current settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentSettings' }
        '401': { $ref: '#/components/responses/Error' }
    patch:
      summary: Update agent settings (partial)
      security: [{ deviceToken: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentSettings' }
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentSettings' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
  /devices:
    get:
      summary: List paired devices
      security: [{ deviceToken: [] }]
      responses:
        '200':
          description: Devices
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Device' }
        '401': { $ref: '#/components/responses/Error' }
  /devices/{id}:
    delete:
      summary: Revoke a paired device, or permanently remove it with ?purge=true
      description: >
        By default revokes the device (its token is rejected thereafter). With
        purge=true the device row is permanently deleted — used to clear revoked
        devices from the list. Either way, the calling device cannot target
        itself.
      security: [{ deviceToken: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - name: purge
          in: query
          required: false
          schema: { type: boolean }
          description: When true, permanently delete the device instead of revoking it.
      responses:
        '204': { description: Revoked or removed }
        '401': { $ref: '#/components/responses/Error' }
        '409':
          description: Cannot target the calling device. code=CONFLICT.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
  /app/latest:
    get:
      summary: Latest available Android APK
      security: [{ deviceToken: [] }]
      responses:
        '200':
          description: Release metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppRelease' }
        '204': { description: No update available }
        '401': { $ref: '#/components/responses/Error' }
  /app/download:
    get:
      summary: Download the latest APK (Range-enabled)
      security: [{ deviceToken: [] }]
      responses:
        '200': { description: APK bytes (application/vnd.android.package-archive) }
        '401': { $ref: '#/components/responses/Error' }
        '404': { description: No update available }

components:
  securitySchemes:
    deviceToken:
      type: http
      scheme: bearer

  responses:
    Error:
      description: Error
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    BatchResult:
      description: Per-item results for a batch operation
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: array
                items:
                  type: object
                  properties:
                    path: { type: string }
                    ok: { type: boolean }
                    error: { $ref: "#/components/schemas/Error" }

  schemas:
    AgentSettings:
      type: object
      properties:
        readOnly: { type: boolean }
        roots:
          type: array
          items: { type: string }
        agentName: { type: string }
    Device:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        created: { type: integer, format: int64 }
        lastSeen: { type: integer, format: int64 }
        revoked: { type: boolean }
        current: { type: boolean }
    AppRelease:
      type: object
      properties:
        versionName: { type: string }
        versionCode: { type: integer }
        size: { type: integer, format: int64 }
    Health:
      type: object
      properties:
        status: { type: string, example: ok }
        name: { type: string, description: Agent display name }
        version: { type: string }
        os: { type: string, enum: [windows, linux] }
        readOnly: { type: boolean }
        address:
          type: string
          description: >
            LAN host:port the agent is reachable at, if detected. Lets an
            already-paired app learn an address it didn't capture at pairing time.
        tailscaleAddress:
          type: string
          description: Tailscale host:port the agent is reachable at, if detected.

    PairRequest:
      type: object
      required: [pairingCode, deviceLabel, clientPublicKey]
      properties:
        pairingCode: { type: string, description: One-time code shown by the agent }
        deviceLabel: { type: string }
        clientPublicKey: { type: string }
        deviceId:
          type: string
          description: >
            Optional hardware-stable client identifier (e.g. Android ID). When
            present, the agent deduplicates pairings so the same device reuses
            its device row instead of creating a duplicate on re-pair.

    PairResponse:
      type: object
      properties:
        deviceToken: { type: string }
        deviceId: { type: string }
        agentName: { type: string }
        certFingerprint: { type: string, description: SHA-256 of agent TLS cert, for pinning }
        address:
          type: string
          description: LAN host:port the agent is reachable at, if detected.
        tailscaleAddress:
          type: string
          description: Tailscale host:port the agent is reachable at, if detected.

    Drive:
      type: object
      properties:
        path: { type: string, example: "C:\\" }
        label: { type: string }
        totalBytes: { type: integer, format: int64 }
        freeBytes: { type: integer, format: int64 }

    Entry:
      type: object
      properties:
        name: { type: string }
        path: { type: string }
        isDir: { type: boolean }
        size: { type: integer, format: int64 }
        mimeType: { type: string }
        mode: { type: string, description: POSIX-style permission string }
        modified: { type: string, format: date-time }
        created: { type: string, format: date-time }
        isSymlink: { type: boolean }

    Listing:
      type: object
      properties:
        path: { type: string }
        entries: { type: array, items: { $ref: "#/components/schemas/Entry" } }
        nextCursor: { type: string, nullable: true }

    CreateRequest:
      type: object
      required: [path]
      properties:
        path: { type: string, description: Full path of the new folder/file }

    TransferOpRequest:
      type: object
      required: [sources, destDir]
      properties:
        sources: { type: array, items: { type: string } }
        destDir: { type: string }
        duplicate: { type: boolean, default: false, description: When true, auto-rename on collision }
        overwrite:
          type: boolean
          default: false
          description: >
            Per-source collision precedence: if duplicate=true, auto-rename
            wins and overwrite is ignored. Else if overwrite=true, the
            existing destination is replaced (removed, then the source is
            copied/moved in its place). Otherwise the item fails with a
            CONFLICT entry in the batch result (ok=false, error.code=CONFLICT).

    UploadSession:
      type: object
      properties:
        id: { type: string }
        path: { type: string }
        size: { type: integer, format: int64 }
        chunkSize: { type: integer }
        totalChunks: { type: integer }
        receivedChunks: { type: array, items: { type: integer }, description: Indices already stored }
        status: { type: string, enum: [open, completed, failed] }

    Error:
      type: object
      description: >
        Uniform error envelope returned on non-2xx responses. The `code` field is
        the authoritative machine-readable vocabulary the agent emits (see enum);
        `message` is a human-readable detail string and may change without notice.
      properties:
        code:
          type: string
          example: PATH_NOT_FOUND
          enum:
            - BAD_REQUEST
            - UNAUTHORIZED
            - READ_ONLY
            - FORBIDDEN
            - PATH_NOT_FOUND
            - CONFLICT
            - CHUNK_HASH_MISMATCH
            - HASH_MISMATCH
            - NOT_AVAILABLE
            - INVALID_CODE
            - DELETE_FAILED
            - RATE_LIMITED
            - PAYLOAD_TOO_LARGE
            - INTERNAL
          description: >
            - `BAD_REQUEST` (400): malformed or missing required fields.
            - `UNAUTHORIZED` (401): missing/invalid/revoked bearer token.
            - `READ_ONLY` (403): agent is in read-only mode; write rejected.
            - `FORBIDDEN` (403): path escapes the configured root jail.
            - `PATH_NOT_FOUND` (404): path does not exist.
            - `CONFLICT` (409): destination already exists, or a /devices
              operation targets the calling device.
            - `CHUNK_HASH_MISMATCH` (409): per-chunk SHA-256 did not match
              X-Chunk-Sha256.
            - `HASH_MISMATCH` (422): whole-file SHA-256 did not match on complete.
            - `NOT_AVAILABLE` (404): no thumbnail/preview available for this file.
            - `INVALID_CODE` (401): pairing code invalid or expired.
            - `DELETE_FAILED`: per-item batch-delete failure (returned inside a
              BatchResult entry, not as a top-level HTTP error).
            - `RATE_LIMITED` (429): too many /pair attempts (10/min).
            - `PAYLOAD_TOO_LARGE` (413): chunk body exceeds the session's chunkSize.
            - `INTERNAL` (500): unexpected server error.
