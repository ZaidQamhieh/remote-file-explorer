openapi: 3.0.3
info:
  title: Remote File Explorer — Host Agent API
  version: 1.16.0
  description: >
    Contract between the Flutter mobile app and the Go host agent. JSON for control and
    metadata; binary streams for file content. All routes except /pair, /register,
    /login, /auth/challenge, and /health require a bearer device token. GET /v1/events
    provides a Server-Sent Events stream for live filesystem change events and transfer
    progress. Clients may send an optional `X-RFE-Client-Version` header (e.g.
    "1.10.0+18") on every authenticated request; the agent records this plus the
    caller's network address against the device row and surfaces both via GET /devices
    (see Device.lastAddress / Device.lastVersion).

    A device's token is "admin" (Device.viaLogin=true) if it was obtained via /login or
    /register (proof of the single account's password) rather than /pair (a one-time
    code meant for an ordinary device like the phone app). Admin devices may manage
    OTHER devices: POST /pairing/generate, and PATCH/DELETE /devices/{id} targeting a
    device other than themselves. An ordinary (non-admin) device may still manage only
    ITSELF via DELETE /devices/{id}.

    Pair, register, and login all require device-identity proof-of-possession: fetch a
    nonce from POST /auth/challenge, sign it with the device's permanent Ed25519 key,
    and send the (devicePublicKey, nonce, signature) triple. The agent pins the public
    key to the device row on first use (TOFU). POST /login additionally *enforces* that
    pin — a known device id presenting a different key is rejected
    (code=DEVICE_KEY_MISMATCH) rather than silently re-trusted, since a password alone
    is weaker proof than the one-time codes /pair and /register require. /pair and
    /register instead re-pin on a key change: consuming a fresh one-time code is
    itself a stronger trust event (physical/terminal access to the host), covering a
    legitimate reinstall that generated a new device key.
servers:
  - url: https://{host}:{port}/v1
    variables:
      host: { default: "127.0.0.1" }
      port: { default: "8765" }

security:
  - deviceToken: []

paths:
  /health:
    get:
      summary: Liveness probe (unauthenticated)
      security: []
      responses:
        "200":
          description: Agent is up
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }

  /status:
    get:
      summary: Agent self-report (uptime, version, platform, disk space)
      security: [{ deviceToken: [] }]
      responses:
        '200':
          description: Agent status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentStatus' }
        '401': { $ref: '#/components/responses/Error' }
        '500': { $ref: '#/components/responses/Error' }

  /metrics:
    get:
      summary: Live host metrics (transfer byte counters, CPU %, RAM %)
      description: >
        rxBytes/txBytes are process-lifetime cumulative totals, not a rate —
        clients diff successive readings against tsMs to derive live bytes/sec.
        cpuPercent/ramPercent are instantaneous point reads (Linux /proc; 0 on
        other platforms). The agent keeps no history, so all series reset on
        restart. The web companion polls this every 2s.
      security: [{ deviceToken: [] }]
      responses:
        '200':
          description: Current host metrics
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Metrics' }
        '401': { $ref: '#/components/responses/Error' }

  /transfers/list:
    get:
      summary: List recent upload transfer sessions (web companion Transfers page)
      description: >
        Read-only listing of the chunked-upload sessions the agent tracks.
        The transfers array is capped at the most recent 200 rows (the table
        accumulates every session ever opened); counts/total aggregate the
        whole table so the summary cards stay accurate. progress is derived
        from received-chunk count; "open" means started-but-never-finalized.
        Distinct from GET /transfers/{id} (single-session status) and POST
        /transfers (open a session).
      security: [{ deviceToken: [] }]
      parameters:
        - name: device
          in: query
          required: false
          schema: { type: string }
          description: >
            Restrict results to transfers opened by this device ID. Omit or
            pass empty for all devices. Values come from the devices list in
            this endpoint's own response.
        - name: user
          in: query
          required: false
          schema: { type: string }
          description: >
            Restrict results to transfers opened by devices authenticated as
            this login account (devices are stamped with a username at
            /login and /register; pair-flow devices are unattributed). Values
            come from the users list in this endpoint's own response.
            Combines with the device filter (AND).
      responses:
        '200':
          description: Recent transfer sessions plus whole-table status counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer, description: Total transfer rows in the table }
                  counts:
                    type: object
                    additionalProperties: { type: integer }
                    description: Row count per status (e.g. open, completed, failed)
                  activeNow:
                    type: integer
                    description: Open transfers that received a chunk in the last 30s
                  devices:
                    type: array
                    description: Distinct devices with at least one transfer, for the filter-chip row and the table's Device/User columns
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        label: { type: string }
                        username: { type: string, description: "\"\" if the device paired by code rather than login" }
                  users:
                    type: array
                    description: Distinct login accounts with at least one transfer, for the user filter-chip row
                    items: { type: string }
                  transfers:
                    type: array
                    items: { $ref: '#/components/schemas/TransferSummary' }
        '401': { $ref: '#/components/responses/Error' }

  /users:
    get:
      summary: List login accounts (web companion Users page)
      description: >
        Usernames and creation times only — never password hashes. RFE has no
        per-user roles or session tracking, so those Figma-style columns are
        intentionally absent.
      security: [{ deviceToken: [] }]
      responses:
        '200':
          description: Login accounts
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/UserSummary' } }
        '401': { $ref: '#/components/responses/Error' }

  /users/{username}:
    delete:
      summary: Permanently remove a login account (web companion Users page)
      description: >
        Every login account is a full admin today (see the /users GET note) —
        there's no self-vs-other distinction like device management has, so
        any authenticated caller may remove any account. The one exception:
        the LAST remaining account can't be deleted (code=LAST_USER), since
        that would brick password login entirely (no way to obtain a device
        token except an existing pairing code).
      security: [{ deviceToken: [] }]
      parameters:
        - { name: username, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: Account removed }
        '400':
          description: >
            username is the only remaining account. code=LAST_USER.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        '401': { $ref: '#/components/responses/Error' }
        '404':
          description: No account with that username. code=NOT_FOUND.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /logs:
    get:
      summary: Tail the agent's own log output (web companion Logs page)
      description: >
        Last ~200 lines of the agent's journald output (Linux/systemd). Empty
        array on non-systemd hosts. Exposes no more than a paired device can
        already read from the filesystem. RFE logs are unstructured, so there
        is no severity level field.
      security: [{ deviceToken: [] }]
      responses:
        '200':
          description: Recent log lines
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/LogLine' } }
        '401': { $ref: '#/components/responses/Error' }

  /agent/restart:
    post:
      summary: Restart the agent's own service (Linux/systemd only)
      description: >
        Any paired device may trigger this — restart-only, no remote stop, so
        there is nothing to get permanently stuck in. Shells out to
        `systemctl --user restart rfe-agent.service`; the response is sent
        before the command runs. Returns 501 on non-Linux agents.
      security: [{ deviceToken: [] }]
      responses:
        '202':
          description: Restart triggered
          content:
            application/json:
              schema: { type: object, properties: { ok: { type: boolean } } }
        '401': { $ref: '#/components/responses/Error' }
        '501':
          description: Not supported on this platform. code=NOT_IMPLEMENTED.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /auth/challenge:
    post:
      summary: Mint a single-use nonce for device-identity proof-of-possession (unauthenticated)
      description: >
        Sign the returned nonce with the device's Ed25519 private key and pass
        it (with the device's public key) to /pair, /register, or /login as
        proof the caller controls that key. Valid for 2 minutes, single-use.
      security: []
      responses:
        "200":
          description: Nonce minted
          content:
            application/json:
              schema:
                type: object
                properties: { nonce: { type: string } }
        "429":
          description: Too many challenge requests (rate-limited at 30/min). code=RATE_LIMITED.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /pair:
    post:
      summary: Complete device pairing (unauthenticated; consumes one-time pairing code)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PairRequest" }
      responses:
        "200":
          description: Device paired; token issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PairResponse" }
        "400":
          description: >
            Malformed body, or missing devicePublicKey/nonce/signature.
            code=BAD_REQUEST or code=DEVICE_KEY_REQUIRED.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "401":
          description: >
            Invalid pairing code (code=INVALID_CODE), nonce missing/expired/reused
            (code=INVALID_NONCE), or signature doesn't verify (code=INVALID_SIGNATURE).
            A key change for an already-known device id is accepted here (re-pinned),
            not rejected — see the device-identity note above.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "429":
          description: >
            Too many pairing attempts (rate-limited at 10/min per agent, since the
            pairing code is short and brute-forceable). code=RATE_LIMITED.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /register:
    post:
      summary: >
        Create the account and pair this device in one step (unauthenticated;
        consumes one-time pairing code). An alternative to `rfe-agent adduser`
        for first-time setup entirely from the phone app or web companion.
        Requires the same one-time pairing code as POST /pair — this is what
        stops a stranger on the network from creating an account before the
        owner does. Enforces one account per agent: fails once any account
        already exists (code=ACCOUNT_ALREADY_EXISTS), regardless of pairing
        code validity — log in instead. Response shape is identical to
        PairResponse.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "200":
          description: Account created, device paired; token issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PairResponse" }
        "400":
          description: >
            Malformed body, missing username, password under 8 characters, or
            missing devicePublicKey/nonce/signature. code=BAD_REQUEST or
            code=DEVICE_KEY_REQUIRED.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "401":
          description: >
            Invalid pairing code (code=INVALID_CODE), or device-identity proof
            failed (code=INVALID_NONCE / INVALID_SIGNATURE — see POST /pair).
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "409":
          description: >
            This agent already has an account (code=ACCOUNT_ALREADY_EXISTS —
            one account per agent; log in instead), or that exact username
            was taken by a concurrent request (code=USERNAME_TAKEN).
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "429":
          description: >
            Too many registration attempts (rate-limited at 10/min per agent).
            code=RATE_LIMITED.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /login:
    post:
      summary: >
        Log in with the account created via POST /register or `rfe-agent
        adduser` (unauthenticated). An additional way to obtain a device
        token alongside POST /pair — not a replacement for it. Response
        shape is identical to PairResponse.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in; device token issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PairResponse" }
        "400":
          description: >
            Malformed body, missing username/password, or missing
            devicePublicKey/nonce/signature. code=BAD_REQUEST or
            code=DEVICE_KEY_REQUIRED.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "401":
          description: >
            Invalid username or password (code=INVALID_CREDENTIALS — the same
            error is returned for a nonexistent username as for a wrong
            password, so a caller can't enumerate valid usernames), or
            device-identity proof failed (code=INVALID_NONCE / INVALID_SIGNATURE
            / DEVICE_KEY_MISMATCH — see POST /pair).
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "429":
          description: >
            Too many login attempts (rate-limited at 10/min per agent).
            code=RATE_LIMITED.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /wol:
    post:
      summary: Send a Wake-on-LAN magic packet to a MAC address on the agent's LAN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mac]
              properties:
                mac: { type: string, description: "Colon-separated MAC address (e.g. aa:bb:cc:dd:ee:ff)" }
      responses:
        "200":
          description: Magic packet sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [sent] }
        "400": { $ref: "#/components/responses/Error" }

  /share/mint:
    post:
      summary: Mint a one-time share link for a single file
      description: >
        Generates a short-lived, single-use, unauthenticated download URL for
        one file. Returns 403 if the agent's `allowSharing` setting is
        disabled (default). See docs/r1-share-link-threat-model.md.
      security: [{ deviceToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string, description: "Absolute path to the file to share." }
                expiresInSeconds:
                  type: integer
                  format: int64
                  description: "Defaults to 900 (15min) if absent/zero. Maximum 86400 (24h)."
      responses:
        "200":
          description: Share link minted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShareLink" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403":
          description: Share links are disabled on this agent. code=FORBIDDEN.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "404": { $ref: "#/components/responses/Error" }

  /share/{token}:
    get:
      summary: Fetch a shared file (UNAUTHENTICATED, single-use)
      description: >
        The only unauthenticated route in the entire agent besides /health
        and /pair. token is single-use: the first successful (or attempted)
        fetch deletes it. Rate-limited 10/min. Returns 404 for both "expired"
        and "never existed" — the response never reveals which.
      security: []
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: File bytes, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
        "404": { $ref: "#/components/responses/Error" }
        "429":
          description: Too many share requests (rate-limited 10/min). code=RATE_LIMITED.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /share/{tokenHash}:
    delete:
      summary: Revoke an active share link
      description: >
        Takes the SHA-256 hash of the token (as returned by POST
        /share/mint's tokenHash field), not the raw token.
      security: [{ deviceToken: [] }]
      parameters:
        - { name: tokenHash, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Revoked (or was already gone) }
        "401": { $ref: "#/components/responses/Error" }

  /share:
    get:
      summary: List active (unexpired) share links
      security: [{ deviceToken: [] }]
      responses:
        "200":
          description: Active share links
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ShareLinkSummary" }
        "401": { $ref: "#/components/responses/Error" }

  /system/drives:
    get:
      summary: List drives / mount points (virtual roots)
      responses:
        "200":
          description: Drives
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Drive" }

  /fs:
    get:
      summary: List a directory
      parameters:
        - { in: query, name: path, required: true, schema: { type: string } }
        - { in: query, name: cursor, schema: { type: string }, description: Pagination cursor (by name) }
        - { in: query, name: limit, schema: { type: integer, default: 200 } }
      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Listing" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      summary: Delete one or more paths (to trash by default, recursive)
      description: >
        By default deletes are **reversible**: each path is moved to the trash
        store (XDG `~/.local/share/Trash` on Linux, a managed dir elsewhere) and
        can be listed/restored via `/trash`. Pass `permanent=true` to bypass the
        trash and remove recursively and irreversibly (equivalent to `rm -rf`).
        Directories are removed along with all of their contents.
      parameters:
        - { in: query, name: path, schema: { type: string }, description: Single path; or use body for batch }
        - in: query
          name: permanent
          required: false
          schema: { type: boolean, default: false }
          description: When true, hard-delete (no trash); otherwise move to trash.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                paths: { type: array, items: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/BatchResult" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /fs/folder:
    post:
      summary: Create a folder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRequest" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }

  /fs/file:
    post:
      summary: Create an empty file
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRequest" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }

  /fs/rename:
    patch:
      summary: Rename / move a single entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [src, dst]
              properties:
                src: { type: string }
                dst: { type: string }
      responses:
        "200": { description: Renamed, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }

  /fs/copy:
    post:
      summary: Copy / duplicate entries (batch-capable)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TransferOpRequest" } } }
      responses:
        "202": { $ref: "#/components/responses/BatchResult" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }

  /fs/move:
    post:
      summary: Move entries (batch-capable)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TransferOpRequest" } } }
      responses:
        "202": { $ref: "#/components/responses/BatchResult" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }

  /fs/compress:
    post:
      summary: Compress entries into a new zip archive
      description: >
        Creates a zip archive at `dest` containing each of `sources` (files or
        directories, recursively). Every source and the destination are
        jail-checked. If `dest` already exists it is auto-renamed ("keep both",
        e.g. `archive (1).zip`) so the call never clobbers an existing file —
        the created archive's actual path is returned in the Entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sources, dest]
              properties:
                sources: { type: array, items: { type: string }, description: "Absolute paths to include." }
                dest: { type: string, description: "Absolute path of the .zip to create." }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /fs/extract:
    post:
      summary: Extract an archive into a directory
      description: >
        Unpacks `archive` into `destDir` (created if absent). Supports `.zip`,
        `.tar.gz` and `.tgz`. Each archive entry's target is validated to stay
        within `destDir` (zip-slip guard); entries that would escape, and
        non-regular entries (symlinks, devices), are rejected/skipped. Both
        paths are jail-checked. Returns the destination directory's Entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [archive, destDir]
              properties:
                archive: { type: string, description: "Absolute path to a .zip/.tar.gz/.tgz file." }
                destDir: { type: string, description: "Absolute directory to extract into." }
      responses:
        "200": { description: Extracted, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /fs/meta:
    get:
      summary: Detailed metadata for a single entry
      parameters:
        - { in: query, name: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Metadata, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /fs/checksum:
    get:
      summary: Compute a file's checksum
      parameters:
        - { in: query, name: path, required: true, schema: { type: string } }
        - in: query
          name: algo
          required: false
          schema: { type: string, enum: [sha256, sha1, md5], default: sha256 }
      responses:
        "200":
          description: Hex-encoded checksum
          content:
            application/json:
              schema:
                type: object
                required: [path, algorithm, checksum]
                properties:
                  path: { type: string }
                  algorithm: { type: string }
                  checksum: { type: string }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /events:
    get:
      summary: Server-Sent Events stream for live filesystem and transfer events
      description: >
        Long-lived SSE connection. The server pushes JSON-encoded events as
        `data:` lines and sends a `: keepalive` comment every 30s to keep the
        connection alive. Event types: `fs.change` (path, action:
        created/modified/deleted), `transfer.progress` (id, bytes, total),
        `transfer.complete` (id, path).
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                description: "Newline-delimited SSE `data:` lines, each containing a JSON SseEvent."
        "401": { $ref: "#/components/responses/Error" }

  /fs/chmod:
    post:
      summary: Change POSIX permissions of a file or directory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, mode]
              properties:
                path: { type: string, description: "Absolute path to the file or directory." }
                mode: { type: string, description: "Octal permission string, e.g. \"0755\"." }
      responses:
        "200": { description: Updated entry, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /fs/archive:
    get:
      summary: List the contents of an archive without extracting
      description: >
        Reads the headers of a zip, tar.gz, tgz, or tar archive and returns
        an array of entries (path, size, modified, isDir) without extracting
        any content. Respects the limit parameter (default 500).
      parameters:
        - { in: query, name: path, required: true, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, default: 500 } }
      responses:
        "200":
          description: Archive entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items: { $ref: "#/components/schemas/ArchiveEntry" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /fs/checksums:
    post:
      summary: Compute checksums for multiple files in one request
      description: >
        Accepts an array of paths and returns a checksum for each. Files that
        fail (not found, directory, permission denied) report an error string
        per entry. Capped at 1000 paths per request. Uses a bounded goroutine
        pool (4 workers) for parallelism.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paths]
              properties:
                paths:
                  type: array
                  items: { type: string }
                  maxItems: 1000
                algo:
                  type: string
                  enum: [sha256, sha1, md5]
                  default: sha256
      responses:
        "200":
          description: Batch checksum results
          content:
            application/json:
              schema:
                type: object
                properties:
                  checksums:
                    type: array
                    items:
                      type: object
                      properties:
                        path: { type: string }
                        hash: { type: string }
                        error: { type: string }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }

  /trash:
    get:
      summary: List items currently in the trash (newest first)
      responses:
        "200":
          description: Trash items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/TrashEntry" }
        "401": { $ref: "#/components/responses/Error" }
    delete:
      summary: Empty the trash (all items, or only the given ids)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ids: { type: array, items: { type: string }, description: "Specific trash ids to purge; omit to empty all." }
      responses:
        "200": { description: Emptied, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        "401": { $ref: "#/components/responses/Error" }

  /trash/restore:
    post:
      summary: Restore trashed items to their original locations
      description: >
        Moves each id back to the original path recorded in its trashinfo. The
        destination is jail-checked; if it is now occupied the restore is
        auto-renamed ("keep both") rather than clobbering. Returns a per-id
        BatchResult whose `path` is the restored location on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids: { type: array, items: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/BatchResult" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }

  /content:
    get:
      summary: Download file content (supports HTTP Range for resumable download)
      description: >
        Accepts an Accept-Encoding: gzip request header. When present, the
        request has no Range header, the file's extension is a compressible
        text/code type, and the file is above a small size floor, the agent
        may respond with Content-Encoding: gzip. A Range header always
        disables compression (gzip offsets don't correspond to the
        original file's byte offsets), so resumable downloads are unaffected.
      parameters:
        - { in: query, name: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Full content, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
        "206": { description: Partial content (Range) }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "416": { $ref: "#/components/responses/Error" }
    put:
      summary: Write (replace) a small text file's content, atomically
      description: >
        Writes the request body to path, replacing its current content. The
        write is atomic (temp file + rename) and the existing file's mode is
        preserved. The body is capped at 5 MiB; larger payloads are rejected
        with 413. Pass baseModified (the `modified` value last read for this
        file via /fs/meta or /fs) to get optimistic-concurrency protection —
        if the file's mtime no longer matches, the write is rejected with 409
        instead of clobbering newer content.
      parameters:
        - { in: query, name: path, required: true, schema: { type: string } }
        - in: query
          name: baseModified
          required: false
          schema: { type: string, format: date-time }
          description: >
            The `modified` timestamp (RFC3339) last read for this file.
            Compared (truncated to the second) against the file's current
            mtime; a mismatch returns 409 STALE_WRITE. Omit for an
            unconditional write (e.g. creating new content).
      requestBody:
        required: true
        content: { application/octet-stream: { schema: { type: string, format: binary } } }
      responses:
        "200": { description: Updated metadata, content: { application/json: { schema: { $ref: "#/components/schemas/Entry" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }

  /transfers:
    post:
      summary: Open a resumable upload session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, size, sha256, chunkSize]
              properties:
                path: { type: string }
                size: { type: integer, format: int64 }
                sha256: { type: string }
                chunkSize: { type: integer }
                overwrite:
                  type: boolean
                  default: false
                  description: >
                    When false (default) and path already exists, the
                    session is rejected with 409 CONFLICT. When true, an
                    existing file at path is replaced once the upload
                    completes.
      responses:
        "201":
          description: Session opened
          content: { application/json: { schema: { $ref: "#/components/schemas/UploadSession" } } }
        "400":
          description: >
            Invalid request — missing path/sha256/chunkSize, negative size, or
            chunkSize over the 32MiB cap. code=BAD_REQUEST.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409":
          description: >
            path already exists and overwrite=false. code=CONFLICT.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /transfers/{id}:
    get:
      summary: Get session status + missing chunks (for resume)
      parameters: [ { in: path, name: id, required: true, schema: { type: string } } ]
      responses:
        "200": { description: Session, content: { application/json: { schema: { $ref: "#/components/schemas/UploadSession" } } } }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      summary: Remove a transfer row from history (web companion Transfers page)
      description: >
        Deletes only the session record, not the uploaded file — for clearing
        stale "open" rows the client never finalized, or "failed" ones.
      security: [{ deviceToken: [] }]
      parameters: [ { in: path, name: id, required: true, schema: { type: string } } ]
      responses:
        '204': { description: Transfer row removed }
        '401': { $ref: '#/components/responses/Error' }
        '404':
          description: No transfer with that ID. code=NOT_FOUND.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /transfers/{id}/chunks/{n}:
    put:
      summary: Upload chunk n (per-chunk checksum)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
        - { in: path, name: n, required: true, schema: { type: integer } }
        - in: header
          name: Content-Range
          required: false
          schema: { type: string }
          description: >
            Optional/informational only — the agent does not currently read this
            header. Chunk placement is fully determined by the {n} path segment
            and the session's chunkSize from POST /transfers.
        - { in: header, name: X-Chunk-Sha256, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/octet-stream: { schema: { type: string, format: binary } } }
      responses:
        "204": { description: Chunk stored }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }

  /transfers/{id}/complete:
    post:
      summary: Finalize upload (verify whole-file hash, atomic rename)
      description: >
        Verifies the whole-file SHA-256 against the hash supplied at session
        open, then atomically renames the temp file to its final destination.
        A 200 response means the file is integrity-verified: it includes
        sha256 (the verified whole-file hash) and verified=true alongside the
        usual Entry fields.
      parameters: [ { in: path, name: id, required: true, schema: { type: string } } ]
      responses:
        "200":
          description: >
            Completed and integrity-verified. Returns the Entry fields plus
            sha256 (the verified whole-file SHA-256) and verified=true.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Entry"
                  - type: object
                    properties:
                      sha256:
                        type: string
                        description: Verified whole-file SHA-256 hash (hex-encoded).
                      verified:
                        type: boolean
                        description: Always true on a successful complete.
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "422":
          description: Whole-file SHA-256 mismatch. code=HASH_MISMATCH.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /thumb:
    get:
      summary: Server-rendered thumbnail / preview
      parameters:
        - { in: query, name: path, required: true, schema: { type: string } }
        - { in: query, name: size, schema: { type: integer, default: 256 } }
      responses:
        "200": { description: Thumbnail, content: { image/jpeg: { schema: { type: string, format: binary } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "404":
          description: No thumbnail available for this file. code=NOT_AVAILABLE.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /search:
    get:
      summary: Search files and folders
      description: >
        Recursively searches under root (or the configured roots / home
        directory) for entries matching q, optionally narrowed by types,
        ext, size bounds, and modified-time bounds. All filters are ANDed
        together. The response body is always a bare JSON array of Entry
        (unchanged from v1) — truncation/partial-result state is signaled
        via response headers instead, so existing clients that only read
        the array continue to work.
      parameters:
        - in: query
          name: q
          required: true
          description: >
            Case-insensitive match against the entry name. If the value
            contains `*` or `?`, it is treated as a glob pattern (matched
            with path.Match against the lowercased name); an invalid glob
            pattern returns 400 BAD_REQUEST. Otherwise it is a
            case-insensitive substring match.
          schema: { type: string }
        - { in: query, name: root, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, default: 100, maximum: 500 } }
        - in: query
          name: types
          description: >
            Comma-separated list of categories to include (AND-ed with the
            other filters). Unknown values return 400 BAD_REQUEST.
          schema:
            type: array
            items:
              type: string
              enum: [folder, image, video, audio, document, archive, other]
          style: form
          explode: false
        - in: query
          name: ext
          description: >
            Comma-separated list of file extensions to include, without the
            leading dot, case-insensitive (e.g. `jpg,png`). Implies
            non-folder; may be combined with types.
          schema: { type: string }
        - in: query
          name: minSize
          description: >
            Minimum file size in bytes (inclusive). When minSize and/or
            maxSize is set, folders are excluded from results. Invalid
            (non-integer) values return 400 BAD_REQUEST.
          schema: { type: integer, format: int64 }
        - in: query
          name: maxSize
          description: >
            Maximum file size in bytes (inclusive). When minSize and/or
            maxSize is set, folders are excluded from results. Invalid
            (non-integer) values return 400 BAD_REQUEST.
          schema: { type: integer, format: int64 }
        - in: query
          name: modifiedAfter
          description: >
            Only include entries modified at or after this timestamp
            (RFC3339). Invalid timestamps return 400 BAD_REQUEST.
          schema: { type: string, format: date-time }
        - in: query
          name: modifiedBefore
          description: >
            Only include entries modified at or before this timestamp
            (RFC3339). Invalid timestamps return 400 BAD_REQUEST.
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: >
            Results as a bare JSON array of Entry (filters applied;
            truncation/time-budget state is reported via headers, not the
            body).
          headers:
            X-Search-Truncated:
              description: >
                Set to `1` when the walk stopped early because the result
                limit was reached. Not set if the walk finished naturally
                or the time budget expired before the limit was hit.
              schema: { type: string, enum: ["1"] }
            X-Search-Time-Budget:
              description: >
                Set to `1` when the 15s search time budget expired before
                the result limit was reached, indicating the results are
                partial. Mutually exclusive with X-Search-Truncated.
              schema: { type: string, enum: ["1"] }
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Entry" } }
        "400":
          description: >
            BAD_REQUEST — missing q, an invalid glob pattern in q, an
            unknown types value, a non-integer minSize/maxSize, or an
            invalid RFC3339 modifiedAfter/modifiedBefore.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "401": { $ref: "#/components/responses/Error" }

  /fs/recent:
    get:
      summary: List the most recently modified files
      description: >
        Recursively walks root (or the configured roots / home directory),
        returning the `limit` most recently modified *files* (directories
        are never included), newest first. Unlike /search, this can't stop
        early once it has `limit` candidates — it keeps a bounded top-K
        (min-heap) of the best candidates seen so far, so the full walk
        (bounded by the same 15s time budget) still has to run. Same
        time-budget signaling as /search: X-Search-Time-Budget is set when
        the budget expired before the walk finished — results are then
        partial (the most recent files *seen*, not guaranteed to be the
        true most-recent files in the tree).
      parameters:
        - { in: query, name: root, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, default: 100, maximum: 500 } }
      responses:
        "200":
          description: Results as a bare JSON array of Entry, newest first.
          headers:
            X-Search-Time-Budget:
              description: >
                Set to `1` when the 15s time budget expired before the walk
                finished, indicating results may be missing more-recent
                files that hadn't been visited yet.
              schema: { type: string, enum: ["1"] }
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Entry" } }
        "401": { $ref: "#/components/responses/Error" }

  /settings:
    get:
      summary: Get agent settings
      security: [{ deviceToken: [] }]
      responses:
        '200':
          description: Current settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentSettings' }
        '401': { $ref: '#/components/responses/Error' }
    patch:
      summary: Update agent settings (partial)
      security: [{ deviceToken: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentSettings' }
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentSettings' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }

  /settings/bandwidth:
    get:
      summary: Get bandwidth limits
      security: [{ deviceToken: [] }]
      responses:
        '200':
          description: Current bandwidth limits
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BandwidthSettings' }
        '401': { $ref: '#/components/responses/Error' }
    put:
      summary: Set bandwidth limits
      security: [{ deviceToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BandwidthSettings' }
      responses:
        '200':
          description: Updated bandwidth limits
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BandwidthSettings' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }

  /devices:
    get:
      summary: List paired devices
      description: >
        Each entry includes lastAddress and lastVersion, captured from the device's most
        recent authenticated request (client IP and the X-RFE-Client-Version header,
        respectively). Both are "" if the device has never made an authenticated request
        with that information.
      security: [{ deviceToken: [] }]
      responses:
        '200':
          description: Devices
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Device' }
        '401': { $ref: '#/components/responses/Error' }
  /devices/{id}:
    patch:
      summary: Set a device's per-device path jail (H2) and/or read-only flag (#8) — admin-only
      description: >
        Requires the CALLER to be an admin device (Device.viaLogin=true — see
        the top-level description). An ordinary (non-admin) device gets 403
        FORBIDDEN regardless of `{id}`, including targeting itself. Both
        fields are optional and independently applied (only fields present in
        the body are changed), mirroring PATCH /settings. Equivalent to the
        `rfe-agent jail <device-id> <path>` / `rfe-agent readonly <id>
        <on|off>` admin CLI commands, which remain available for PC-side use.
      security: [{ deviceToken: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jailRoot:
                  type: string
                  description: Absolute path, or "" to clear the per-device jail.
                readOnly:
                  type: boolean
      responses:
        '200':
          description: Updated device
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Device' }
        '400':
          description: >
            Invalid JSON body, or jailRoot is not absolute / does not resolve
            within the agent's configured global roots. code=BAD_REQUEST.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        '401': { $ref: '#/components/responses/Error' }
        '403':
          description: >
            Caller is not an admin device. code=FORBIDDEN.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        '404':
          description: No device with that id. code=NOT_FOUND.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    delete:
      summary: Revoke or permanently remove a device, with ?purge=true for the latter
      description: >
        A device may always manage ITSELF (`{id}` equal to the calling
        device's own id). Managing another device additionally requires the
        caller to be an admin device (Device.viaLogin=true — see the
        top-level description); an ordinary (non-admin) device targeting
        another id is rejected. By default this revokes the target device
        (its token is rejected thereafter, 204). With purge=true the target
        device row is permanently deleted instead (204).


        The `rfe-agent revoke`/`remove` admin CLI remains available on the PC
        regardless of caller type.
      security: [{ deviceToken: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - name: purge
          in: query
          required: false
          schema: { type: boolean }
          description: When true, permanently delete the target device instead of revoking it.
      responses:
        '204': { description: Target device revoked or removed }
        '401': { $ref: '#/components/responses/Error' }
        '403':
          description: >
            `{id}` is not the calling device's own id, and the caller is not
            an admin device. code=FORBIDDEN.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
  /pairing/generate:
    post:
      summary: Mint a new one-time pairing code from an authenticated session — admin-only
      description: >
        Lets a new device be paired without a trip to the PC terminal
        (`rfe-agent pair`). Requires the caller to be an admin device
        (Device.viaLogin=true — see the top-level description); an ordinary
        (non-admin) device is rejected, since minting fresh codes for
        arbitrary new devices is a materially bigger privilege than the
        read-only web-companion endpoints.
      security: [{ deviceToken: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ttlSeconds:
                  type: integer
                  description: How long the code stays valid. Defaults to 3600 (1 hour) if omitted or <= 0.
                guest:
                  type: boolean
                  description: >
                    Mint a Guest code instead: the device created when this
                    code is redeemed is forced read-only and jailed to
                    jailRoot from creation, and (like every device) can't
                    change its own jail/read-only state — only an admin can.
                    Requires jailRoot.
                jailRoot:
                  type: string
                  description: Required when guest=true. Validated the same way as PATCH /devices/{id}'s jailRoot.
      responses:
        '200':
          description: Pairing code minted
          content:
            application/json:
              schema:
                type: object
                properties:
                  pairingCode: { type: string }
                  expiresInSeconds: { type: integer }
                  qrPayload:
                    type: object
                    description: Same payload shape embedded in the PC-printed QR code.
                    properties:
                      address: { type: string }
                      tailscaleAddress: { type: string }
                      certFingerprint: { type: string }
                      pairingCode: { type: string }
                  qrPngBase64:
                    type: string
                    description: >
                      Base64-encoded PNG (240px) of a QR code encoding qrPayload as JSON —
                      lets the web companion show a scannable code, same as `rfe-agent pair`'s
                      terminal QR. Omitted (not an error) if QR encoding fails; the text code
                      alone is always sufficient to pair.
        '400':
          description: guest=true without a valid jailRoot. code=BAD_REQUEST.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        '401': { $ref: '#/components/responses/Error' }
        '403':
          description: Caller is not an admin device. code=FORBIDDEN.
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
  /app/latest:
    get:
      summary: Latest available Android APK
      security: [{ deviceToken: [] }]
      responses:
        '200':
          description: Release metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppRelease' }
        '204': { description: No update available }
        '401': { $ref: '#/components/responses/Error' }
  /app/download:
    get:
      summary: Download the latest APK (Range-enabled)
      security: [{ deviceToken: [] }]
      responses:
        '200': { description: APK bytes (application/vnd.android.package-archive) }
        '401': { $ref: '#/components/responses/Error' }
        '404': { description: No update available }

components:
  securitySchemes:
    deviceToken:
      type: http
      scheme: bearer

  responses:
    Error:
      description: Error
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    BatchResult:
      description: Per-item results for a batch operation
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: array
                items:
                  type: object
                  properties:
                    path: { type: string }
                    ok: { type: boolean }
                    error: { $ref: "#/components/schemas/Error" }

  schemas:
    AgentSettings:
      type: object
      properties:
        readOnly: { type: boolean }
        roots:
          type: array
          items: { type: string }
        agentName: { type: string }
        allowSharing:
          type: boolean
          description: >
            Host-level gate for R1 one-time share links (default false).
            POST /share/mint returns 403 while this is false.
        photoBackupRoot:
          type: string
          description: >
            PC-side destination folder for phone photo backup, set from the
            web companion Settings page only. Empty means not configured —
            phones must refuse to back up rather than pick their own path.
    ShareLink:
      type: object
      properties:
        token: { type: string, description: "Raw token — shown only once, in this response." }
        tokenHash: { type: string, description: "SHA-256 hash of token; pass this to DELETE /share/{tokenHash}." }
        expiresAt: { type: integer, format: int64, description: "Unix seconds." }
        url: { type: string, description: "Fully-qualified https URL the recipient fetches." }
    ShareLinkSummary:
      type: object
      properties:
        tokenHash: { type: string }
        path: { type: string }
        expiresAt: { type: integer, format: int64, description: "Unix seconds." }
    BandwidthSettings:
      type: object
      properties:
        maxUploadBytesPerSec:
          type: integer
          format: int64
          description: >
            Maximum upload (phone→PC) throughput in bytes per second.
            0 means unlimited.
        maxDownloadBytesPerSec:
          type: integer
          format: int64
          description: >
            Maximum download (PC→phone) throughput in bytes per second.
            0 means unlimited.
    Device:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        created: { type: integer, format: int64 }
        lastSeen: { type: integer, format: int64 }
        revoked: { type: boolean }
        current: { type: boolean }
        lastAddress: { type: string, description: "Client IP from the last authenticated request (port stripped); empty if never seen." }
        lastVersion: { type: string, description: "Value of the last X-RFE-Client-Version header sent by this device; empty if never reported." }
        jailRoot:
          type: string
          description: >
            Per-device path jail (H2). Empty means no per-device restriction —
            the device gets the agent's full configured root jail. When
            non-empty, an absolute path; the device is confined to that
            subtree, intersected with the agent's configured roots.
        readOnly:
          type: boolean
          description: >
            Per-device read-only flag (#8). When true, the device may browse and
            download but every filesystem write (create/upload/rename/move/
            delete/compress/extract/write-content) is rejected with 403
            READ_ONLY, independent of the agent's global read-only mode. Set
            via `rfe-agent readonly <id> <on|off>` on the PC, or by an admin
            device via PATCH /devices/{id}.
        viaLogin:
          type: boolean
          description: >
            True if this device's current token was obtained via /login or
            /register (the account password) rather than /pair (a one-time
            code). Admin devices (viaLogin=true) may manage OTHER devices —
            see the top-level description.
    AppRelease:
      type: object
      properties:
        versionName: { type: string }
        versionCode: { type: integer }
        size: { type: integer, format: int64 }
    Health:
      type: object
      properties:
        status: { type: string, example: ok }
        name: { type: string, description: Agent display name }
        version: { type: string }
        os: { type: string, enum: [windows, linux] }
        readOnly: { type: boolean }
        address:
          type: string
          description: >
            LAN host:port the agent is reachable at, if detected. Lets an
            already-paired app learn an address it didn't capture at pairing time.
        tailscaleAddress:
          type: string
          description: Tailscale host:port the agent is reachable at, if detected.
        macAddress:
          type: string
          description: >
            MAC address of the LAN network interface (e.g. "aa:bb:cc:dd:ee:ff").
            The app caches this so it can send a Wake-on-LAN magic packet when
            the host is asleep and the agent is unreachable. Empty/absent when
            the LAN interface has no hardware address.

    PairRequest:
      type: object
      required: [pairingCode, deviceLabel, devicePublicKey, nonce, signature]
      properties:
        pairingCode: { type: string, description: One-time code shown by the agent }
        deviceLabel: { type: string }
        devicePublicKey:
          type: string
          description: This device's permanent Ed25519 public key, standard base64 (32 raw bytes).
        nonce: { type: string, description: A nonce obtained from POST /auth/challenge. }
        signature:
          type: string
          description: nonce signed with the device's private key, standard base64 (64 raw bytes).
        deviceId:
          type: string
          description: >
            Optional hardware-stable client identifier (e.g. Android ID). When
            present, the agent deduplicates pairings so the same device reuses
            its device row instead of creating a duplicate on re-pair.

    RegisterRequest:
      type: object
      required: [pairingCode, username, password, devicePublicKey, nonce, signature]
      properties:
        pairingCode: { type: string, description: One-time code shown by the agent (same as PairRequest). }
        username: { type: string }
        password: { type: string, description: Minimum 8 characters. }
        deviceLabel: { type: string, description: "Defaults to \"unnamed-device\" if omitted." }
        devicePublicKey: { $ref: "#/components/schemas/PairRequest/properties/devicePublicKey" }
        nonce: { $ref: "#/components/schemas/PairRequest/properties/nonce" }
        signature: { $ref: "#/components/schemas/PairRequest/properties/signature" }
        deviceId:
          type: string
          description: Optional hardware-stable client identifier, same dedup behavior as PairRequest.deviceId.

    LoginRequest:
      type: object
      required: [username, password, devicePublicKey, nonce, signature]
      properties:
        username: { type: string }
        password: { type: string }
        deviceLabel: { type: string, description: "Defaults to \"unnamed-device\" if omitted." }
        devicePublicKey: { $ref: "#/components/schemas/PairRequest/properties/devicePublicKey" }
        nonce: { $ref: "#/components/schemas/PairRequest/properties/nonce" }
        signature: { $ref: "#/components/schemas/PairRequest/properties/signature" }
        deviceId:
          type: string
          description: >
            Optional hardware-stable client identifier, same dedup behavior as
            PairRequest.deviceId.

    PairResponse:
      type: object
      properties:
        deviceToken: { type: string }
        deviceId: { type: string }
        agentName: { type: string }
        certFingerprint: { type: string, description: SHA-256 of agent TLS cert, for pinning }
        address:
          type: string
          description: LAN host:port the agent is reachable at, if detected.
        tailscaleAddress:
          type: string
          description: Tailscale host:port the agent is reachable at, if detected.

    Drive:
      type: object
      properties:
        path: { type: string, example: "C:\\" }
        label: { type: string }
        totalBytes: { type: integer, format: int64 }
        freeBytes: { type: integer, format: int64 }
        isOS: { type: boolean, description: "True for the drive that contains the operating system." }

    Entry:
      type: object
      properties:
        name: { type: string }
        path: { type: string }
        isDir: { type: boolean }
        size: { type: integer, format: int64 }
        mimeType: { type: string }
        mode: { type: string, description: POSIX-style permission string }
        modified: { type: string, format: date-time }
        created: { type: string, format: date-time }
        isSymlink: { type: boolean }
        symlinkTarget: { type: string, description: "Absolute path the symlink points to (only present when isSymlink is true)" }

    Listing:
      type: object
      properties:
        path: { type: string }
        entries: { type: array, items: { $ref: "#/components/schemas/Entry" } }
        nextCursor: { type: string, nullable: true }

    TrashEntry:
      type: object
      properties:
        id: { type: string, description: Opaque trash id (used by /trash/restore and DELETE /trash). }
        name: { type: string }
        originalPath: { type: string, description: Where the item will be restored to. }
        deletedAt: { type: string, format: date-time }
        size: { type: integer, format: int64 }
        isDir: { type: boolean }

    CreateRequest:
      type: object
      required: [path]
      properties:
        path: { type: string, description: Full path of the new folder/file }

    TransferOpRequest:
      type: object
      required: [sources, destDir]
      properties:
        sources: { type: array, items: { type: string } }
        destDir: { type: string }
        duplicate: { type: boolean, default: false, description: When true, auto-rename on collision }
        overwrite:
          type: boolean
          default: false
          description: >
            Per-source collision precedence: if duplicate=true, auto-rename
            wins and overwrite is ignored. Else if overwrite=true, the
            existing destination is replaced (removed, then the source is
            copied/moved in its place). Otherwise the item fails with a
            CONFLICT entry in the batch result (ok=false, error.code=CONFLICT).

    UploadSession:
      type: object
      properties:
        id: { type: string }
        path: { type: string }
        size: { type: integer, format: int64 }
        chunkSize: { type: integer }
        totalChunks: { type: integer }
        receivedChunks: { type: array, items: { type: integer }, description: Indices already stored }
        status: { type: string, enum: [open, completed, failed] }

    ArchiveEntry:
      type: object
      properties:
        path: { type: string, description: "Relative path inside the archive." }
        size: { type: integer, format: int64, description: "Uncompressed size in bytes." }
        modified: { type: string, format: date-time }
        isDir: { type: boolean }

    SseEvent:
      type: object
      description: >
        A server-sent event payload. Only the fields relevant to the event
        type are populated.
      properties:
        type: { type: string, enum: [fs.change, transfer.progress, transfer.complete] }
        path: { type: string }
        action: { type: string, enum: [created, modified, deleted] }
        id: { type: string }
        bytes: { type: integer, format: int64 }
        total: { type: integer, format: int64 }

    AgentStatus:
      type: object
      properties:
        version: { type: string }
        uptimeSeconds: { type: integer, format: int64 }
        platform: { type: string }
        freeBytes: { type: integer, format: int64 }
        totalBytes: { type: integer, format: int64 }

    Metrics:
      type: object
      properties:
        rxBytes: { type: integer, format: int64 }
        txBytes: { type: integer, format: int64 }
        cpuPercent: { type: number, format: double }
        ramPercent: { type: number, format: double }
        tsMs: { type: integer, format: int64 }

    TransferSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string, description: "basename of the target path" }
        path: { type: string }
        totalSize: { type: integer, format: int64 }
        receivedBytes: { type: integer, format: int64 }
        progress: { type: number, format: double, description: "0-100, from received-chunk count" }
        status: { type: string, enum: [open, completed, failed] }
        deviceId: { type: string, description: "opening device id; may be empty for pre-migration rows" }
        updatedAt: { type: integer, format: int64, description: "unix seconds, stamped per received chunk; 0 = never" }

    UserSummary:
      type: object
      properties:
        username: { type: string }
        created: { type: integer, format: int64, description: "unix seconds" }

    LogLine:
      type: object
      properties:
        ts: { type: string, description: "ISO-8601 timestamp from journald" }
        message: { type: string }

    Error:
      type: object
      description: >
        Uniform error envelope returned on non-2xx responses. The `code` field is
        the authoritative machine-readable vocabulary the agent emits (see enum);
        `message` is a human-readable detail string and may change without notice.
      properties:
        code:
          type: string
          example: PATH_NOT_FOUND
          enum:
            - BAD_REQUEST
            - UNAUTHORIZED
            - READ_ONLY
            - FORBIDDEN
            - PATH_NOT_FOUND
            - CONFLICT
            - CHUNK_HASH_MISMATCH
            - HASH_MISMATCH
            - NOT_AVAILABLE
            - INVALID_CODE
            - DELETE_FAILED
            - RATE_LIMITED
            - PAYLOAD_TOO_LARGE
            - NOT_FOUND
            - INTERNAL
          description: >
            - `BAD_REQUEST` (400): malformed or missing required fields.
            - `UNAUTHORIZED` (401): missing/invalid/revoked bearer token.
            - `READ_ONLY` (403): write rejected — the agent is in global
              read-only mode OR the calling device has the per-device read-only
              flag set (#8).
            - `FORBIDDEN` (403): path escapes the configured root jail; or a
              /devices/{id} DELETE/PATCH or /pairing/generate call that
              requires an admin device (Device.viaLogin=true) came from a
              non-admin device.
            - `PATH_NOT_FOUND` (404): path does not exist.
            - `NOT_FOUND` (404): PATCH /devices/{id} — no device with that id.
            - `CONFLICT` (409): destination already exists.
            - `CHUNK_HASH_MISMATCH` (409): per-chunk SHA-256 did not match
              X-Chunk-Sha256.
            - `HASH_MISMATCH` (422): whole-file SHA-256 did not match on complete.
            - `NOT_AVAILABLE` (404): no thumbnail/preview available for this file.
            - `INVALID_CODE` (401): pairing code invalid or expired.
            - `DELETE_FAILED`: per-item batch-delete failure (returned inside a
              BatchResult entry, not as a top-level HTTP error).
            - `RATE_LIMITED` (429): too many /pair attempts (10/min).
            - `PAYLOAD_TOO_LARGE` (413): chunk body exceeds the session's chunkSize.
            - `INTERNAL` (500): unexpected server error.
        message: { type: string }
        details: { type: object, additionalProperties: true }
